/**
 * escapeHtml — Sanitise toute chaîne avant injection dans un template HTML.
 * Remplace les 5 caractères dangereux par leurs entités HTML.
 * OBLIGATOIRE sur toute variable utilisateur injectée dans exportPDF().
 */
function escapeHtml(str) {
  if (str === null || str === undefined) return "";
  return String(str)
    .replace(/&/g,  "&amp;")
    .replace(/</g,  "&lt;")
    .replace(/>/g,  "&gt;")
    .replace(/"/g,  "&quot;")
    .replace(/'/g,  "&#x27;");
}

/**
 * validateField(field, value) — retourne un message d'erreur ou "" si valide.
 * Utilisable dans tous les formulaires pour feedback immédiat.
 */
function validateField(field, value) {
  if (value === null || value === undefined) return "";
  const v = String(value);
  const limit = INPUT_LIMITS[field];
  if (limit && v.length > limit)
    return `${v.length}/${limit} — Limite dépassée de ${v.length - limit} caractère${v.length - limit > 1 ? "s" : ""}.`;
  if (field === "email" && v.length > 0 && !v.includes("@"))
    return "Adresse email invalide.";
  if (field === "aph" && v.length > 0 && !/^(\d{7}|TEST\d{3})$/.test(v))
    return "Le numéro APH doit contenir exactement 7 chiffres.";
  if (field === "telephone" && v.length > 0 && !/^[\d\s().+\-]{5,20}$/.test(v))
    return "Format de téléphone invalide.";
  if (field === "ipp" && v.length > 0 && !/^[A-Z0-9\-]{1,20}$/.test(v))
    return "Format IPP invalide.";
  return "";
}

/**
 * CharCounter — composant affichant un compteur de caractères coloré.
 * Affiché uniquement quand la saisie dépasse 80% de la limite.
 */
function CharCounter({ value, field }) {
  const limit = INPUT_LIMITS[field];
  if (!limit) return null;
  const len = String(value || "").length;
  const pct = len / limit;
  if (pct < 0.8) return null;
  const color = pct >= 1 ? "#ef4444" : pct >= 0.95 ? "#f59e0b" : "#94a3b8";
  return (
    React.createElement('div', { style: { fontSize: 10, color, textAlign: "right", marginTop: 3, fontWeight: pct >= 0.95 ? 700 : 400 },}
      , len, "/", limit, " caractères" , pct >= 1 ? " — limite atteinte" : ""
    )
  );
}

            ...(!isPraticien ? [{ id: "stats", label: "Stats", icon: "📊" }] : []),
            ...(isAdmin ? [{ id: "admin", label: "Admin", icon: "⚙️" }] : []),
            { id: "_notifs", label: "Notifs", icon: "🔔" },
            { id: "_menu", label: "Menu", icon: "☰" },
          ].map(n => {
            const unread = n.id === "_notifs" ? mockNotifications.filter(x => x.medecinId === user.id && !x.lu).length : 0;
            return (
              React.createElement('button', { key: n.id, onClick: () => {
                if (n.id === "_menu") setMobileMenuOpen(true);
                else if (n.id === "_notifs") setShowNotifs(v => !v);
                else navigate(n.id);
              }, style: {
                background: "none", border: "none", cursor: "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                color: page === n.id ? "#38bdf8" : "rgba(255,255,255,0.4)",
                padding: "4px 10px", position: "relative",
              },}
                , React.createElement('span', { style: { fontSize: 20 },}, n.icon)
                , unread > 0 && (
                  React.createElement('span', { style: {
                    position: "absolute", top: 0, right: 6,
                    background: "#ef4444", color: "#fff", borderRadius: "50%",
                    width: 16, height: 16, fontSize: 9, fontWeight: 800,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    border: "2px solid #0f172a",
                  },}, unread)
                )
                , React.createElement('span', { style: { fontSize: 10, fontWeight: page === n.id ? 700 : 400 },}, n.label)
              )
            );
          })
        )
      )

    )
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
